<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Online Gratis - Kalkulator Matematika Dasar | WebTool</title>
    <meta name="description" content="Kalkulator online gratis untuk perhitungan matematika dasar. Tambah, kurang, kali, bagi dengan mudah. Dapat digunakan di semua perangkat tanpa instalasi.">
    <meta name="keywords" content="kalkulator online, kalkulator gratis, kalkulator matematika, calculator, tool hitung, kalkulator web">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://webtool.yourdomain.com/tools/calculator/index.html">
    <link rel="stylesheet" href="../../css/style.css">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Kalkulator Online",
      "url": "https://webtool.yourdomain.com/tools/calculator/index.html",
      "description": "Kalkulator online gratis untuk perhitungan matematika dasar",
      "applicationCategory": "UtilityApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "IDR"
      }
    }
    </script>
</head>
<body>
    <nav><a href="../../index.html">← Kembali ke Dashboard</a></nav>
    <div class="tool-box">
        <h2>🧮 Kalkulator Online</h2>
        <p class="tool-description">Kalkulator standar untuk perhitungan matematika dasar</p>
        <input type="text" id="display" disabled>
        <div class="button-grid">
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('/')">÷</button>
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('*')">×</button>
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('-')">−</button>
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate()">=</button>
            <button onclick="clearDisplay()">C</button>
        </div>
    </div>
    <script>
        function append(val) { document.getElementById('display').value += val; }
        function calculate() { try { document.getElementById('display').value = eval(document.getElementById('display').value); } catch(e) { document.getElementById('display').value = 'Error'; } }
        function clearDisplay() { document.getElementById('display').value = ''; }
    </script>
</body>
</html>
