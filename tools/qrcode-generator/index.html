<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator Gratis - Buat QR Code dari Teks atau URL | WebTool</title>
    <meta name="description" content="Generator QR Code gratis dan mudah digunakan. Buat QR Code dari teks, URL, atau konten lainnya dengan kustomisasi warna dan ukuran. Download dalam format PNG.">
    <meta name="keywords" content="qr code generator, buat qr code, qr code gratis, generate qr code, qr code online, qr code png, tool qr code">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://webtool.yourdomain.com/tools/qrcode-generator/index.html">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "QR Code Generator",
      "url": "https://webtool.yourdomain.com/tools/qrcode-generator/index.html",
      "description": "Generator QR Code gratis untuk membuat QR Code dari teks atau URL",
      "applicationCategory": "UtilityApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "IDR"
      }
    }
    </script>
</head>
<body>
    <header>
        <a href="../../index.html" class="back-btn">← Kembali</a>
        <h1>🔳 QR Code Generator</h1>
        <p>Buat QR Code dari teks atau URL dengan mudah dan gratis</p>
    </header>
    
    <main class="qrcode-container">
        <div class="input-section">
            <div class="form-group">
                <label for="qr-text">Teks atau URL</label>
                <textarea 
                    id="qr-text" 
                    placeholder="Masukkan teks, URL, atau konten yang ingin dijadikan QR Code..."
                    rows="4"
                ></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="qr-size">Ukuran (px)</label>
                    <input type="number" id="qr-size" value="256" min="128" max="512" step="64">
                </div>
                
                <div class="form-group">
                    <label for="qr-color">Warna QR</label>
                    <input type="color" id="qr-color" value="#000000">
                </div>
                
                <div class="form-group">
                    <label for="qr-bg-color">Warna Background</label>
                    <input type="color" id="qr-bg-color" value="#ffffff">
                </div>
            </div>
            
            <div class="button-group">
                <button id="generate-btn" class="btn btn-primary">Generate QR Code</button>
                <button id="download-btn" class="btn btn-success" disabled>Download PNG</button>
                <button id="clear-btn" class="btn btn-secondary">Clear</button>
            </div>
        </div>
        
        <div class="preview-section">
            <h2>Preview</h2>
            <div id="qrcode-container" class="qrcode-preview">
                <div class="placeholder">
                    <p>QR Code akan muncul di sini</p>
                </div>
            </div>
            <p class="hint">💡 Tips: Scan QR Code ini dengan kamera smartphone Anda</p>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 WebTool - QR Code Generator</p>
    </footer>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
