<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Suhu</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav><a href="../../index.html">← Kembali ke Dashboard</a></nav>
    <div class="tool-box">
        <h2>Konversi Suhu</h2>
        <div>
            <label for="celsius">Masukkan suhu dalam Celsius:</label>
            <input type="number" id="celsius" placeholder="Contoh: 25">
        </div>
        <button onclick="convert()">Konversi</button>
        <div id="results">
            <p id="fahrenheit"></p>
            <p id="kelvin"></p>
        </div>
    </div>
    <script>
        function convert() {
            let c = document.getElementById('celsius').value;
            if (c === '' || isNaN(c)) {
                alert('Masukkan angka yang valid');
                return;
            }
            let f = (c * 9/5) + 32;
            let k = parseFloat(c) + 273.15;
            document.getElementById('fahrenheit').innerText = c + "°C = " + f.toFixed(2) + "°F";
            document.getElementById('kelvin').innerText = c + "°C = " + k.toFixed(2) + "K";
        }
    </script>
</body>
</html>
